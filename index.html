<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Khawla Canvas Calculator</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <img src="logo.png" class="logo">

        <h1>حاسبة تسعير اللوحات الفنية</h1>

        <div class="card">

            <label>عرض اللوحة (سم)</label>
            <input type="number" id="width">

            <label>ارتفاع اللوحة (سم)</label>
            <input type="number" id="height">
            <label>سعر المتر</label>
            <input type="number" id="meterPrice" value="250">

            <label>الخصم الأول (%)</label>
            <input type="number" id="discount1" value="0">

            <label>الخصم الثاني (%)</label>
            <input type="number" id="discount2" value="0">

            <div class="checkbox-container">
                <input type="checkbox" id="frame">
                <label for="frame">إضافة إطار</label>
            </div>

            <button onclick="calculatePrice()">
                حساب السعر
            </button>

        </div>

        <div class="card">

            <h2>النتائج</h2>

            <p id="roll">الرول المختار : -</p>

            <p id="canvasPrice">سعر اللوحة : -</p>

            <p id="framePrice">سعر الإطار : -</p>

            <p id="totalPrice" class="total">
                الإجمالي : -
            </p>

            <h3>معاينة رسالة الواتساب</h3>

            <textarea id="messagePreview"></textarea>

            <button onclick="copyMessage()">
                📋 نسخ رسالة الواتساب
            </button>

        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
